spring:
  application:
    name: infralytix-technologies
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

server:
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: INFRALYTIX AI TECHNOLOGIES - Enterprise Software Solutions

infralytix:
  company:
    name: INFRALYTIX AI TECHNOLOGIES
    tagline: Powering Intelligent Infrastructure
    email: contact@infralytix.in
    phone: +91-7506426501
    whatsapp: +917506426501
    address: Pune, Maharashtra, India
    website: https://infralytix.in
