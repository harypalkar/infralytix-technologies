<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(${pageTitle}, 'Enterprise engineering insights on AI, cloud, Java, Spring Boot, DevOps, and security.')}"></head>
<body>
<div th:replace="~{fragments/loader :: loader}"></div>
<canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
<div th:replace="~{fragments/bg-effects :: bgEffects}"></div>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section th:replace="~{fragments/page-hero :: pageHero('Blogs', 'Engineering Insights', 'Technical perspectives from our enterprise software engineering team.', '/images/pages/blogs.jpg')}"></section>

<section class="section">
    <div class="container">
        <div class="section-header text-center">
            <span class="section-eyebrow">Articles</span>
            <h2>Latest Engineering Insights</h2>
            <p>Deep dives into AI, cloud, Java, DevOps, monitoring, security, and architecture.</p>
            <div class="section-divider"></div>
        </div>
        <div class="blogs-grid">
            <article th:each="blog : ${blogs}" class="enterprise-card blog-card-enterprise glow-hover animate-on-scroll">
                <div class="enterprise-card-media">
                    <img th:src="'/images/' + ${blog.image}" th:alt="${blog.title}" loading="lazy"/>
                    <div class="card-3d-shine"></div>
                    <span class="blog-category-badge" th:text="${blog.category}">AI</span>
                </div>
                <div class="enterprise-card-body">
                    <time th:text="${blog.date}">2026-07-01</time>
                    <h3 th:text="${blog.title}">Blog Title</h3>
                    <p th:text="${blog.excerpt}">Excerpt</p>
                    <a href="/contact" class="card-link">Request Full Article <i class="fas fa-arrow-right"></i></a>
                </div>
            </article>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
