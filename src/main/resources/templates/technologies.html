<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(${pageTitle}, 'Java, Spring Boot, React, AWS, Azure, Kubernetes, and enterprise technology stack.')}"></head>
<body>
<div th:replace="~{fragments/loader :: loader}"></div>
<canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
<div th:replace="~{fragments/bg-effects :: bgEffects}"></div>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section th:replace="~{fragments/page-hero :: pageHero('Technologies', 'Technology Stack', 'Production-proven technologies powering enterprise-grade software delivery.', '/images/pages/technologies.jpg')}"></section>

<section class="section">
    <div class="container">
        <div class="section-header text-center">
            <span class="section-eyebrow">Stack</span>
            <h2>Technologies We Master</h2>
            <p>20 enterprise technologies — each with dedicated engineering expertise.</p>
            <div class="section-divider"></div>
        </div>
        <div class="tech-grid">
            <div th:each="tech : ${technologies}" class="tech-card-enterprise card-3d glow-hover animate-on-scroll">
                <div class="tech-img">
                    <img th:src="'/images/' + ${tech.image}" th:alt="${tech.name}" loading="lazy"/>
                </div>
                <div class="tech-name" th:text="${tech.name}">Java</div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
