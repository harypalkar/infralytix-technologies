<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(${pageTitle}, 'Enterprise portfolio — banking platforms, AI chatbots, cloud migration, and observability solutions.')}"></head>
<body>
<div th:replace="~{fragments/loader :: loader}"></div>
<canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
<div th:replace="~{fragments/bg-effects :: bgEffects}"></div>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section th:replace="~{fragments/page-hero :: pageHero('Portfolio', 'Enterprise Portfolio', 'Delivering mission-critical solutions for regulated and high-scale organizations.', '/images/pages/portfolio.jpg')}"></section>

<section class="section">
    <div class="container">
        <div class="section-header text-center">
            <span class="section-eyebrow">Projects</span>
            <h2>Enterprise Case Studies</h2>
            <p>Each project represents a unique engineering challenge solved with precision.</p>
            <div class="section-divider"></div>
        </div>
        <div class="portfolio-grid">
            <article th:each="project : ${projects}" class="enterprise-card card-3d glow-hover animate-on-scroll">
                <div class="enterprise-card-media">
                    <img th:src="'/images/' + ${project.image}" th:alt="${project.title}" loading="lazy"/>
                    <div class="card-3d-shine"></div>
                </div>
                <div class="enterprise-card-body">
                    <h3 th:text="${project.title}">Project</h3>
                    <p th:text="${project.description}">Description</p>
                    <div class="portfolio-tech-tags">
                        <span th:each="tech : ${project.technologies}" th:text="${tech}">Java</span>
                    </div>
                </div>
            </article>
        </div>
    </div>
</section>

<section class="cta-enterprise">
    <div class="container">
        <div class="cta-panel glass-panel animate-on-scroll">
            <div>
                <h2>Build Your Next Enterprise Project</h2>
                <p>Let's discuss how we can deliver similar results for your organization.</p>
            </div>
            <div class="cta-actions">
                <a href="/contact" class="btn btn-primary btn-glow">Start Conversation</a>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
