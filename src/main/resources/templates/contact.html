<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(${pageTitle}, 'Contact INFRALYTIX TECHNOLOGIES for enterprise software solutions.')}"></head>
<body>
<div th:replace="~{fragments/loader :: loader}"></div>
<canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
<div th:replace="~{fragments/bg-effects :: bgEffects}"></div>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section th:replace="~{fragments/page-hero :: pageHero('Contact', 'Get In Touch', 'Partner with INFRALYTIX to build intelligent enterprise infrastructure.', '/images/pages/contact.jpg')}"></section>

<section class="section">
    <div class="container">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="contact-grid">
            <div class="contact-info-card animate-on-scroll">
                <img src="/images/logo.png" alt="INFRALYTIX TECHNOLOGIES" style="width: 64px; height: 64px; object-fit: contain; margin-bottom: 24px;"/>
                <h2 style="font-family: var(--font-display); margin-bottom: 8px;">Contact INFRALYTIX</h2>
                <p style="color: var(--text-muted); margin-bottom: 32px;">We respond to enterprise inquiries within one business day.</p>

                <div class="contact-info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <strong>Phone</strong>
                        <p><a th:href="'tel:' + ${companyPhone}" th:text="${companyPhone}">+91-9876543210</a></p>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <strong>Email</strong>
                        <p><a th:href="'mailto:' + ${companyEmail}" th:text="${companyEmail}">contact@infralytix.in</a></p>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fab fa-whatsapp"></i>
                    <div>
                        <strong>WhatsApp</strong>
                        <p><a th:href="'https://wa.me/' + ${#strings.replace(companyWhatsapp, '+', '')}" th:text="${companyWhatsapp}" target="_blank" rel="noopener noreferrer">WhatsApp</a></p>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fas fa-location-dot"></i>
                    <div>
                        <strong>Address</strong>
                        <p th:text="${companyAddress}">Pune, Maharashtra, India</p>
                    </div>
                </div>
                <div class="contact-info-item">
                    <i class="fas fa-globe"></i>
                    <div>
                        <strong>Website</strong>
                        <p><a th:href="${companyWebsite}" th:text="${companyWebsite}">https://infralytix.in</a></p>
                    </div>
                </div>

                <div class="social-links" style="margin-top: 24px;">
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>
                </div>
            </div>

            <div class="contact-form-card animate-on-scroll delay-1">
                <h2 style="font-family: var(--font-display); margin-bottom: 24px;">Send Us a Message</h2>
                <form th:action="@{/contact}" th:object="${contactForm}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Your name" required/>
                            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: #f87171; font-size: 0.8rem;"></span>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="your@email.com" required/>
                            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #f87171; font-size: 0.8rem;"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" th:field="*{phone}" class="form-control" placeholder="+91-XXXXXXXXXX" required/>
                        <span class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: #f87171; font-size: 0.8rem;"></span>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" th:field="*{message}" class="form-control" placeholder="How can we help your enterprise?" required></textarea>
                        <span class="error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}" style="color: #f87171; font-size: 0.8rem;"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-glow" style="width: 100%; justify-content: center;">Send Message</button>
                </form>
            </div>
        </div>

        <div style="margin-top: 48px;">
            <div class="glass-panel animate-on-scroll" style="overflow: hidden; border-radius: var(--radius-lg);">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d242015.32817233747!2d73.6981481!3d18.5204303!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2bf2e67461101%3A0x828d43bf9d9ee343!2sPune%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
                    width="100%" height="400" style="border:0;" allowfullscreen=""
                    loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                    title="INFRALYTIX TECHNOLOGIES — Pune, Maharashtra">
                </iframe>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
